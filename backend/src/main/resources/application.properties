quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://shotly.at, https://admin.shotly.at, https://shotly-frontend-development-566625943723.europe-west1.run.app
%dev.quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET, POST, PUT, DELETE

quarkus.http.cors.headers=Content-Type, Authorization

%prod.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

%dev.quarkus.smallrye-graphql.print-data-fetcher-exception=true

%prod.quarkus.smallrye-graphql.schema-available=false
%prod.quarkus.smallrye-graphql.field-visibility=no-introspection

# postgres

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}

#auth0

quarkus.oidc.auth-server-url=https://login.shotly.at
quarkus.oidc.client-id=4FPKDtlCQjAToOwAEiG6ZrL0eW2UXlx4
quarkus.oidc.credentials.secret=${AUTH0SECRET}
quarkus.oidc.application-type=service
me.kendler.yanik.auth0.Auth0ManagementClient/mp-rest/url=${AUTH0_URL}

quarkus.http.auth.permission.authenticated.paths=/graphql/*
#quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.authenticated.policy=permit
quarkus.oidc.authentication.scopes=openid,profile,email

auth0.client-id=3Dot2zLTomeodgXZfgcx3yZdQXcULUqo
auth0.client-secret=${AUTH0_MANAGEMENT_SECRET}
auth0.audience=https://dev-pvlm4i5qpteni14h.us.auth0.com/api/v2/

#payments

stripe.api-key=${STRIPE_API_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.frontend-url=${FRONTEND_URL}

#deployment

quarkus.package.jar.type=uber-jar

#db migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.migrate-at-start=false